version: '3.8'
services:
  user-db:
    image: postgres:15
    container_name: jira-user-db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=jira_user
      - POSTGRES_PASSWORD=secret_pass
      - POSTGRES_DB=jira_users_db
  kafka:
    image: apache/kafka:3.7.0  # Stable production-ready image
    container_name: jira-kafka
    ports:
      - "9092:9092"  # Exposes Kafka to your local machine (your Spring Boot apps)
    environment:
      # Configure Kafka to run without ZooKeeper (KRaft mode)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:9093'

      # Define how connections are handled outside vs inside Docker
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://localhost:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'

      # Basic cluster settings
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk' # A unique identifier for your local cluster
